name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Permissions the GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      # Preview of the v2 reimagining (branch `v2`, see PRD.md there) served under /v2/.
      # The app builds with relative asset paths, so it is subfolder-safe; its service worker
      # scopes to /v2/. Remove this step when v2 replaces v1 at the M7 parity gate.
      - name: Build v2 preview into dist/v2
        run: |
          git fetch origin v2 --depth 1
          git worktree add /tmp/v2 origin/v2
          cd /tmp/v2
          npm ci
          npm run build
          rm -f dist/CNAME
          mkdir -p "$GITHUB_WORKSPACE/dist/v2"
          cp -r dist/. "$GITHUB_WORKSPACE/dist/v2/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages intermittently answers "Deployment failed, try again later" even when nothing is
      # wrong with the artifact; a cool-down retry reliably clears it (observed repeatedly).
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Cool down before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 300

      - name: Deploy to GitHub Pages (retry after cool-down)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
